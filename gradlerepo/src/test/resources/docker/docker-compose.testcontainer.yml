services:
  mysql:
    image: mysql:8.0
    container_name: retail-test-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: retail_test

    ports:
      - "3306:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: