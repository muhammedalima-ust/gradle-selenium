name: Test Environment

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v5

      - name: 2. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'
    
      - name: 3. Grant execute permission
        working-directory: gradlerepo
        run: chmod +x gradlew

      
      - name: 4. Run Tests
        working-directory: gradlerepo
        run: ./gradlew test --tests "com.gradleproject.data.OrderTestIT"